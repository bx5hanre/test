<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Clinique Nedjma 2</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Jost', sans-serif; background: #0B1628; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card {
    background: #152238; border: 1px solid rgba(201,168,76,0.2);
    padding: 56px 48px; width: 100%; max-width: 420px;
    position: relative;
  }
  .login-card::before { content: ''; position: absolute; top: -1px; left: 40px; right: 40px; height: 2px; background: #C9A84C; }
  .login-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: #fff; text-align: center; margin-bottom: 8px; }
  .login-logo span { color: #C9A84C; }
  .login-subtitle { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #8A9BB5; text-align: center; margin-bottom: 40px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #8A9BB5; margin-bottom: 8px; }
  .form-group input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #fff; padding: 13px 16px; font-size: 14px; font-family: 'Jost', sans-serif; outline: none; transition: border-color 0.3s; }
  .form-group input:focus { border-color: rgba(201,168,76,0.5); }
  .login-btn { width: 100%; background: #C9A84C; color: #0B1628; border: none; padding: 15px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-family: 'Jost', sans-serif; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.3s; }
  .login-btn:hover { background: #E8C97A; }
  .login-btn:disabled { opacity: 0.6; cursor: default; }
  .error-msg { background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.3); color: #f87171; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">Clinique <span>Nedjma</span> 2</div>
  <div class="login-subtitle">Admin Control Panel</div>
  <div class="error-msg" id="error-msg"></div>
  <form id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@clinic.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn" id="login-btn">Sign In</button>
  </form>
</div>

<script src="../firebase-config.js"></script>
<script>
  // If already logged in, go straight to dashboard
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'dashboard.html';
  });

  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    btn.textContent = 'Signing in…'; btn.disabled = true;
    errEl.style.display = 'none';
    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = 'dashboard.html';
    } catch(err) {
      const msgs = {
        'auth/user-not-found': 'No account found with this email.',
        'auth/wrong-password': 'Incorrect password.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/too-many-requests': 'Too many failed attempts. Try again later.',
      };
      errEl.textContent = msgs[err.code] || 'Login failed. Please try again.';
      errEl.style.display = 'block';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
